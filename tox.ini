[tox]
envlist =
    py3
    black
    flake8
    mypy
    pyright
isolated_build = True

[tox:.package]
basepython = python3

[testenv]
commands =
    poetry install
    poetry run pytest {posargs}
whitelist_externals = poetry

[testenv:black]
skip_install = true
whitelist_externals = poetry
commands =
    poetry install
    poetry run black --check python_chargepoint/ tests/

[testenv:flake8]
skip_install = true
whitelist_externals = poetry
commands =
    poetry install
    poetry run flake8 python_chargepoint/ tests/

[testenv:mypy]
skip_install = true
whitelist_externals = poetry
commands =
    poetry install
    poetry run mypy python_chargepoint/

[testenv:pyright]
skip_install = true
whitelist_externals = poetry
commands =
    poetry install
    poetry run pyright python_chargepoint/

[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --cov
    --cov-config=tox.ini
    --cov-report=term
    --cov-report=xml

[flake8]
# Match Black Formatter
max-line-length = 88
extend-ignore = E203, E501, W503

[coverage:run]
source = python_chargepoint
branch = True
omit = python_chargepoint/__main__.py

[coverage:report]
show_missing = True
fail_under = 90

